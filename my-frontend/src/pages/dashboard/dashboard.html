<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./dashboard.css">
</head>

<body>
    <div class="container">
        <aside class="left-sidebar">
            <section class="profile-info">
                <p>Thông tin tài khoản</p>
            </section>

            <nav class="side-menu">
                <button class="menu-item">Bảng điều khiển</button>
                <button class="menu-item">Chi phí</button>
                <button class="menu-item">Chức năng khác</button>
                <button class="menu-item">Cài đặt</button>
                <button class="menu-item">Hỗ trợ</button>
            </nav>

            <section class="logo">
                <img src="D:\TTCS Project\Resource\Logo.png" class="logo-img"/>
                <h2>Expense Manager</h2>
            </section>
        </aside> <!-- Dùng Shift Alt F để căn chỉnh ngay-->
        <main class="content">
            <section class="summary">
                <h3>Tóm tắt:</h3>
                <hr class="summary-line"/>
                <p>Tổng thu nhập:</p>
                <hr class="summary-line"/>
                <p>Tổng chi phí:</p>
                <hr class="summary-line"/>
                <p>Số dư:</p>
            </section>

            <section class="transactions">
                <h3>Các giao dịch gần đây</h3>
                <ul>
                    <li class="trans-list">Giao dịch 1</li>
                    <li class="trans-list">Giao dịch 2</li>
                    <li class="trans-list">Giao dịch 3</li>
                </ul>
            </section>

            <section class="chart">
                <br />
                Chỗ cho biểu đồ
            </section>
        </main>
    </div>
</body>

</html>
