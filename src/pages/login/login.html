<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login.css">
</head>

<body>
    <div class="container">
        <section class="left-empty"></section>
        <section class="middle-sect">
            <section class="upper-empty"></section>
            <main class="login-section">
                <h3 class="login-title">ĐĂNG NHẬP</h3>
                <p class="user-login-title">Email</p>
                <input type="email" required class="input-field" />
                <p class="password-login-title">Mật khẩu</p>
                <input type="password" require class="input-field" />
                <a class="login-button" href="../dashboard/dashboard.html"><strong>ĐĂNG NHẬP</strong></a>
                <p>Không có tài khoản? <a class="register-button" href="../register/register.html">Đăng ký</a></p>
            </main>
            <section class="lower-empty"></section>
        </section>
        <section class="right-empty"></section>
    </div>
</body>

</html>
