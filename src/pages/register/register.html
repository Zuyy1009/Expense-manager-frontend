<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./register.css">
</head>

<body>
    <div class="container">
        <section class="left-empty"></section>
        <section class="middle-sect">
            <section class="upper-empty"></section>
            <form action="/submit-registration" method="post" class="register-section">
                <h3 class="register-title">TẠO TÀI KHOẢN MỚI</h3>
                <div class="name-section">
                    <p>Họ</p>
                    <input type="text" class="name-input-field" />
                    <p>Tên</p>
                    <input type="text" class="name-input-field" />
                </div>
                <p>Ngày sinh</p>
                <input type="date" class="name-input-field" />
                <p>Email</p>
                <input type="email" class="input-field" />
                <p>Mật khẩu</p>
                <input type="password" class="input-field" />
                <button class="register-button" ><strong>ĐĂNG KÝ</strong></button>
            </form>
            <section class="lower-empty"></section>
        </section>
        <section class="right-empty"></section>
    </div>
    <script src="./register.js"></script>
</body>

</html>
